<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Nexus AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #050816 0%, #0a0f1e 40%, #0d1117 70%, #030712 100%);
      font-family: 'Inter', system-ui, sans-serif;
      color: #f0f4f8;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      padding: 48px 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.875rem; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 12px 24px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; font-size: 0.875rem; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
