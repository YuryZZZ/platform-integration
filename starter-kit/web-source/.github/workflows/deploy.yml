name: CI — Build & Deploy on Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: web
        run: npx next lint || true

      - name: Build
        working-directory: web
        run: npm run build
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}
          NEXT_PUBLIC_PRIMARY_COLOR: ${{ vars.NEXT_PUBLIC_PRIMARY_COLOR }}

      - name: Test
        working-directory: web
        run: npm test -- --passWithNoTests || true

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install & Build
        working-directory: web
        run: npm ci && npm run build
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}
          NEXT_PUBLIC_PRIMARY_COLOR: ${{ vars.NEXT_PUBLIC_PRIMARY_COLOR }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"

# ─────────────────────────────────────────────────────────────
# REQUIRED GitHub Secrets (Settings → Secrets → Actions):
#   FIREBASE_SERVICE_ACCOUNT   ← Firebase service account JSON (base64)
#   GOOGLE_AI_API_KEY          ← From aistudio.google.com
#
# REQUIRED GitHub Variables (Settings → Variables → Actions):
#   FIREBASE_PROJECT_ID        ← Your Firebase project ID
#   NEXT_PUBLIC_SITE_NAME      ← Your site name
#   NEXT_PUBLIC_PRIMARY_COLOR  ← Your brand color hex
# ─────────────────────────────────────────────────────────────
