# Spec 53, 54, 60: Cloud Run modular deployment with absolute boundaries
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nexus-ai-web
  annotations:
    run.googleapis.com/ingress: "all"
    run.googleapis.com/ingress-status: "all"
spec:
  template:
    metadata:
      annotations:
        # Enforcing absolute maximums (max 10 instances) to control costs
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "1"
        # Export metrics telemetry cleanly to Stackdriver
        run.googleapis.com/execution-environment: "gen2"
        run.googleapis.com/cpu-boost: "true"
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/nexus-ai/web:latest
        ports:
        - name: http1
          containerPort: 3000
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
        env:
        - name: NODE_ENV
          value: "production"
        # Redacted secrets will be wired via Google Cloud Secret Manager natively.
